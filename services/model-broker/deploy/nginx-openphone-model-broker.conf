# Example nginx TLS reverse proxy for the OpenPhone model broker.
# Replace broker.openphone.example, certificate paths, and log paths before use.

server {
    listen 80;
    listen [::]:80;
    server_name broker.openphone.example;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name broker.openphone.example;

    ssl_certificate /etc/letsencrypt/live/broker.openphone.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/broker.openphone.example/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:OpenPhoneBrokerSSL:10m;
    ssl_session_timeout 1d;

    access_log /var/log/nginx/openphone-model-broker.access.log;
    error_log /var/log/nginx/openphone-model-broker.error.log warn;

    client_max_body_size 16m;
    client_body_timeout 30s;
    keepalive_timeout 30s;
    send_timeout 120s;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header Cache-Control no-store always;

    location = /healthz {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /v1/ {
        limit_except POST {
            deny all;
        }

        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_request_buffering on;
        proxy_buffering off;
        proxy_read_timeout 130s;
        proxy_send_timeout 130s;
    }

    location / {
        return 404;
    }
}
