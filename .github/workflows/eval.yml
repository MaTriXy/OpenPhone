name: Eval

on:
  workflow_dispatch:
    inputs:
      goals:
        description: "Comma-separated task goals. Empty uses the canonical smoke set."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  trajectory-smokes:
    name: Trajectory smokes
    runs-on: [self-hosted, openphone-device]
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate repository
        run: |
          set -euxo pipefail
          ./scripts/check.sh

      - name: Run trajectory smoke suite
        env:
          INPUT_GOALS: ${{ inputs.goals }}
        run: |
          set -euxo pipefail
          ./scripts/run-eval-suite.sh

      - name: Upload trajectories
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openphone-trajectories
          path: .worktree/eval-trajectories/
          if-no-files-found: warn
