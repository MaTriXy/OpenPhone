name: Release

# Builds an OTA on the EC2 self-hosted runner and publishes it as a GitHub
# Release asset. Triggered manually so we never accidentally cut a release on
# every push.
#
# Prereqs:
# - A self-hosted runner registered with the label `openphone-build` against
#   this repo, running on the EC2 build host (~200GB disk, the existing
#   /home/ubuntu/OpenPhone tree, and the SSH keys + Android source already in
#   place).
# - The runner user can invoke `scripts/build.sh openphone_tegu` directly.
# - The runner has `gh` (GitHub CLI) authenticated, OR the workflow uses
#   GITHUB_TOKEN to upload via softprops/action-gh-release@v2.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.0.1). Used as both the tag and the release name.'
        required: true
        default: 'v0.0.1'
      prerelease:
        description: 'Mark as pre-release?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  build-ota:
    name: Build OpenPhone OTA
    runs-on: [self-hosted, openphone-build]
    timeout-minutes: 60
    steps:
      - name: Check out repository at this commit
        uses: actions/checkout@v4

      - name: Build openphone_tegu OTA
        env:
          OPENPHONE_ANDROID_DIR: /home/ubuntu/OpenPhone/.worktree/android
          OPENPHONE_RELEASE: bp4a
          OPENPHONE_BUILD_GOAL: otapackage
        run: |
          set -euxo pipefail
          ./scripts/build.sh openphone_tegu

      - name: Stage OTA artifact for upload
        id: stage
        env:
          OPENPHONE_ANDROID_DIR: /home/ubuntu/OpenPhone/.worktree/android
        run: |
          set -euxo pipefail
          mkdir -p release-staging
          src="${OPENPHONE_ANDROID_DIR}/out/target/product/tegu/openphone_tegu-ota.zip"
          dst="release-staging/openphone_tegu-${{ inputs.version }}-ota.zip"
          cp "$src" "$dst"
          sha256sum "$dst" | tee "${dst}.sha256"
          echo "ota_path=$dst" >> "$GITHUB_OUTPUT"
          echo "sha_path=${dst}.sha256" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          set -euxo pipefail
          {
            echo "OpenPhone ${{ inputs.version }}"
            echo
            echo "Pixel 9a (tegu) OTA built from commit ${GITHUB_SHA}."
            echo
            echo "**Sideload:**"
            echo
            echo '```'
            echo 'adb reboot sideload-auto-reboot'
            echo "adb sideload openphone_tegu-${{ inputs.version }}-ota.zip"
            echo '```'
            echo
            echo "After the device boots, push the assistant APK from"
            echo "\`/system_ext/priv-app/OpenPhoneAssistant/\` (already in the OTA)."
            echo
            echo "**Bring your own OpenAI API key** — set it via the assistant's dev"
            echo "settings or:"
            echo
            echo '```'
            echo 'adb shell settings put secure openphone_dev_openai_api_key sk-...'
            echo '```'
            echo
            echo "Recent commits:"
            echo
            git log -10 --pretty='format:- %h %s'
          } > release-notes.md

      - name: Create GitHub Release with OTA + sha256
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          body_path: release-notes.md
          prerelease: ${{ inputs.prerelease == 'true' }}
          files: |
            ${{ steps.stage.outputs.ota_path }}
            ${{ steps.stage.outputs.sha_path }}
