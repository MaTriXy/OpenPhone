name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.0.1-preview.1"
        required: true
        default: "v0.0.1-preview.1"
      device:
        description: "Device target"
        required: true
        default: "tegu"
        type: choice
        options:
          - tegu
      prerelease:
        description: "Mark as a GitHub prerelease"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  build-device-preview:
    name: Build device preview
    runs-on: [self-hosted, openphone-build]
    timeout-minutes: 180
    env:
      OPENPHONE_ANDROID_DIR: ${{ vars.OPENPHONE_ANDROID_DIR || '.worktree/android' }}
      OPENPHONE_RELEASE: bp4a
      OPENPHONE_BUILD_GOAL: otapackage
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate repository
        run: |
          set -euxo pipefail
          ./scripts/check.sh
          git diff --check

      - name: Build OTA
        run: |
          set -euxo pipefail
          ./scripts/build.sh openphone_${{ inputs.device }}

      - name: Stage release artifacts
        id: stage
        run: |
          set -euxo pipefail
          staging=".worktree/releases/${{ inputs.version }}"
          product_dir="${OPENPHONE_ANDROID_DIR}/out/target/product/${{ inputs.device }}"
          src="${product_dir}/openphone_${{ inputs.device }}-ota.zip"
          dst="${staging}/openphone_${{ inputs.device }}-${{ inputs.version }}-ota.zip"

          mkdir -p "$staging"
          cp "$src" "$dst"
          scripts/generate-release-manifest.sh "${{ inputs.version }}" "$staging" "$staging"
          scripts/validate-release-artifacts.sh "$staging"

          echo "staging=$staging" >> "$GITHUB_OUTPUT"
          echo "ota_path=$dst" >> "$GITHUB_OUTPUT"
          echo "sha_path=${staging}/SHA256SUMS" >> "$GITHUB_OUTPUT"
          echo "artifacts_path=${staging}/ARTIFACTS.md" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          body_path: docs/releases/0.0.1.md
          prerelease: ${{ inputs.prerelease == 'true' }}
          files: |
            ${{ steps.stage.outputs.ota_path }}
            ${{ steps.stage.outputs.sha_path }}
            ${{ steps.stage.outputs.artifacts_path }}
